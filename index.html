
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otevřená Informatika</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: '#0a0f1a',
                neon: '#0066ff',
                cyan: '#00e5ff',
                card: '#161e2d',
              }
            },
            fontFamily: {
              sans: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
            background-color: #0a0f1a;
            color: #f8fafc;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Markdown Styles */
        .markdown-content h1 { @apply text-3xl font-black text-white mt-12 mb-6; }
        .markdown-content h2 { @apply text-2xl font-black text-white mt-10 mb-5; }
        .markdown-content h3 { @apply text-xl font-bold text-white mt-8 mb-4; }
        .markdown-content p { @apply mb-6 leading-relaxed text-slate-400; }
        .markdown-content ul { @apply list-disc list-inside mb-6 space-y-2 text-slate-400; }
        .markdown-content ol { @apply list-decimal list-inside mb-6 space-y-2 text-slate-400; }
        .markdown-content li { @apply ml-4; }
        .markdown-content li > p { @apply inline; }
        .markdown-content a { @apply text-brand-cyan hover:text-brand-neon underline transition-colors; }
        .markdown-content blockquote { @apply border-l-4 border-brand-neon pl-6 py-2 italic text-slate-300 bg-white/5 rounded-r-xl mb-6; }
        .markdown-content code { @apply bg-white/10 px-1.5 py-0.5 rounded font-mono text-sm text-brand-cyan; }
        .markdown-content pre { @apply bg-brand-card p-6 rounded-2xl border border-white/5 overflow-x-auto mb-8; }
        .markdown-content pre code { @apply bg-transparent p-0 text-slate-300; }
        .markdown-content img { @apply rounded-3xl border border-white/5 my-10 shadow-2xl; }
        .markdown-content strong { @apply font-bold text-white; }
        .markdown-content hr { @apply border-white/5 my-12; }
        .markdown-content table { @apply w-full border-collapse bg-transparent text-slate-300 my-8; }
        .markdown-content thead { @apply bg-transparent; }
        .markdown-content tbody { @apply bg-transparent; }
        .markdown-content tr { @apply bg-transparent; }
        .markdown-content th { @apply bg-transparent text-white font-bold border border-white/10 px-4 py-2 text-left; }
        .markdown-content td { @apply bg-transparent border border-white/10 px-4 py-2 align-top; }
    </style>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      // ----------------------------------------------------------------------
      // This script checks to see if a redirect is present in the query string,
      // converts it back into a correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to refresh the page or register a
      // new history entry.
      (function(l) {
        if (!l.search) {
          return;
        }

        var params = new URLSearchParams(l.search);
        var p = params.get('p');
        if (!p || p.charAt(0) !== '/') {
          return;
        }

        var q = params.get('q');
        var decodedPath = p.replace(/~and~/g, '&');
        var decodedQuery = q ? ('?' + q.replace(/~and~/g, '&')) : '';
        var basePath = l.pathname.replace(/\/$/, '');

        window.history.replaceState(null, null, basePath + decodedPath + decodedQuery + l.hash);
      }(window.location));
    </script>
    <!-- Polyfill pro podporu import map ve starších prohlížečích -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.1/dist/es-module-shims.js"></script>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@7.1.3?deps=react@19.0.0,react-dom@19.0.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <!-- Explicitní načtení vstupního bodu aplikace -->
    <script type="module" src="./index.tsx"></script>
</body>
</html>
